seed_schema: pygrc.landscape_seed
seed_version: "0.1"

meta:
  name: GRCL9V3 Hybrid Choice Transport
  description: Composed GRCL-9V3 source seed combining choice/collapse and transport rerouting elementary examples.
  source_kind: manual_seed
  source_reference: outputs/grcl9v3/lowering/sessions/S0011/selector_manifest.json
  source_schema_version: "0.1"
  source_domain: grcl9v3
  tags: [grcl9v3, composition, choice, collapse, transport]
  translator_name: manual_seed_authoring
  translator_version: "0.1"
  translation_mode: semantic_enrichment

constitutive_profile:
  lambda_c: 1.0
  xi_c: 1.5
  zeta_c: 0.8
  kappa_c: 1.0
  dt: 0.001
  potential:
    type: double_well
    params:
      a: 1.0
      b: 1.2

primitives:
  - id: choice_region
    type: saddle
    branch_target_ids: [basin_a, basin_b]
    extensions:
      grcl9v3:
        term_kind: choice_collapse_region
        term_id: hybrid_choice_transport_composition_choice
        region_id: choice_region
        source_role: composition_control
        profile:
          basin_region_a: basin_a
          basin_region_b: basin_b
          collapse_target_region: basin_a
          compatibility_profile:
            compatibility: high_contrast
  - id: basin_a
    type: basin
    coherence_prior: 1.0
    extensions:
      grcl9v3:
        term_kind: stable_basin
        term_id: hybrid_choice_transport_composition_basin_a
        region_id: basin_a
        source_role: composition_control
        profile:
          basin: choice_branch_a
  - id: basin_b
    type: basin
    coherence_prior: 0.4
    extensions:
      grcl9v3:
        term_kind: stable_basin
        term_id: hybrid_choice_transport_composition_basin_b
        region_id: basin_b
        source_role: composition_control
        profile:
          basin: choice_branch_b
  - id: transport_route
    type: valley
    from_id: transport_source
    to_id: transport_sink
    extensions:
      grcl9v3:
        term_kind: transport_rerouting_region
        term_id: hybrid_choice_transport_composition_transport
        region_id: route
        source_role: composition_control
        profile:
          source_region_id: transport_source
          sink_region_id: transport_sink
          route_preference_profile:
            corridor: preferred
  - id: transport_valley
    type: valley
    from_id: transport_source
    to_id: transport_route
    extensions:
      grcl9v3:
        term_kind: valley_channel
        term_id: hybrid_choice_transport_composition_valley
        region_id: route
        source_role: composition_control
        profile:
          channel: transport_corridor
  - id: transport_source
    type: basin
    coherence_prior: 1.0
  - id: transport_sink
    type: basin
    coherence_prior: 0.2

extensions:
  grcl9v3:
    contract_version: grcl9v3.landscape_example.v1
    grcl9v3_required: true
    example_name: hybrid_choice_transport_composition
    manifest_entry_id: composed_grcl9v3_hybrid_composition_v1
    motif_id: grc9v3-motif-s0016-hybrid-choice-transport-composition
    expected_selector_ids: [choice_collapse_events, transport_rerouting_signature]
    notes:
      discovery_anchor: S0011 selector-backed elementary batch
      boundary: source preconditions only
      composed_source_ancestry:
        - choice_collapse_positive_control
        - transport_basin_rerouting_positive_control
