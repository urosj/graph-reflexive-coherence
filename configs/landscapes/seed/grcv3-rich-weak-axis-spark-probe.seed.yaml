seed_schema: pygrc.landscape_seed
seed_version: "0.1"

meta:
  name: GRCV3 Rich Weak-Axis Spark Probe
  description: Shielded interior spindle probe for testing whether current grcv3.rich.v2 lowering can realize a low-gradient interior weak-axis spark candidate without injecting solved Hessians.
  source_kind: manual_seed
  source_reference: implementation/manual/grcv3-rich-weak-axis-spark-probe
  source_schema_version: "0.1"
  source_domain: "2d"
  translator_name: manual_seed_authoring
  translator_version: "0.1"
  translation_mode: lossless_source_normalization
  translation_notes:
    - This fixture is not derived from the PDE landscape corpus.
    - It is designed to test whether a shielded interior spindle can produce a sparkable weak-axis candidate through the current grcv3.rich.v2 lowering path.
    - The seed encodes constructive geometry only and does not prescribe any solved differential state.

constitutive_profile:
  lambda_c: 1.0
  xi_c: 1.5
  zeta_c: 0.8
  kappa_c: 1.0
  dt: 0.001
  potential:
    type: double_well
    params:
      a: 1.0
      b: 1.2

primitives:
  - id: left_reservoir
    type: basin
    coherence_prior: 0.52
    depth_hint: 0
    chart_center_hint: [0.18, 0.5]
    chart_scale_hint:
      radius: 0.085

  - id: right_reservoir
    type: basin
    coherence_prior: 0.52
    depth_hint: 0
    chart_center_hint: [0.82, 0.5]
    chart_scale_hint:
      radius: 0.085

  - id: upper_shell
    type: basin
    coherence_prior: 0.22
    depth_hint: 0
    chart_center_hint: [0.5, 0.28]
    chart_scale_hint:
      radius: 0.07

  - id: lower_shell
    type: basin
    coherence_prior: 0.22
    depth_hint: 0
    chart_center_hint: [0.5, 0.72]
    chart_scale_hint:
      radius: 0.07

  - id: spindle_core
    type: saddle
    coherence_prior: 0.74
    chart_center_hint: [0.5, 0.5]
    branch_target_ids:
      - right_reservoir
      - left_reservoir
    notes: Interior probe with west-east transport and north-south clamp loading kept off the center itself.
    extensions:
      grcv3:
        realization:
          kind: junction_motif
          support_count: 2
          radius_scale: 0.35
          branch_order: [west, east]
        local_geometry:
          frame_mode: branch_ordered
          axis_roles: [north, east, south, west]
          weak_axis_role: east
          symmetry_class: bilateral
          center_role: interior_probe
        curvature_intent:
          class: near_degenerate
          stable_axis_roles: [north, south]
          weak_axis_role: east
          ordering: weak << stable
        interfaces:
          branch_targets:
            west: left_reservoir
            east: right_reservoir
          boundary_roles: [clamp_north, clamp_south]
          channel_roles: [inlet, outlet]
          preferred_attachment_sites:
            clamp_north: north
            clamp_south: south
            inlet: west
            outlet: east

  - id: upper_clamp
    type: ridge
    owner_id: spindle_core
    ridge_kind: boundary
    adjacent_ids: [upper_shell]
    thickness_hint: 0.02
    interior_coherence_hint: 0.74
    exterior_coherence_hint: 0.22
    chart_principal_axis_hint: [1.0, 0.0]
    extensions:
      grcv3:
        boundary_geometry:
          realization_kind: support_arc
          normal_role: north
          tangent_role: east
          arc_span: tight
          support_distribution: uniform
        interfaces:
          boundary_roles: [clamp_north]
          preferred_attachment_sites:
            clamp_north: north

  - id: lower_clamp
    type: ridge
    owner_id: spindle_core
    ridge_kind: boundary
    adjacent_ids: [lower_shell]
    thickness_hint: 0.02
    interior_coherence_hint: 0.74
    exterior_coherence_hint: 0.22
    chart_principal_axis_hint: [1.0, 0.0]
    extensions:
      grcv3:
        boundary_geometry:
          realization_kind: support_arc
          normal_role: south
          tangent_role: east
          arc_span: tight
          support_distribution: uniform
        interfaces:
          boundary_roles: [clamp_south]
          preferred_attachment_sites:
            clamp_south: south

  - id: left_inlet
    type: valley
    from_id: left_reservoir
    to_id: spindle_core
    width_hint: 0.022
    coherence_prior: 0.18
    path_hint: bezier
    waypoints:
      - [0.3, 0.5]
      - [0.4, 0.5]
    extensions:
      grcv3:
        channel_geometry:
          realization_kind: single_channel
          interior_count: 1
          waypoint_policy: midpoint_only
          entry_role: east
          exit_role: west
        interfaces:
          channel_roles: [inlet]
          preferred_attachment_sites:
            inlet: west

  - id: right_outlet
    type: valley
    from_id: spindle_core
    to_id: right_reservoir
    width_hint: 0.022
    coherence_prior: 0.18
    path_hint: bezier
    waypoints:
      - [0.6, 0.5]
      - [0.7, 0.5]
    extensions:
      grcv3:
        channel_geometry:
          realization_kind: single_channel
          interior_count: 1
          waypoint_policy: midpoint_only
          entry_role: east
          exit_role: west
        interfaces:
          channel_roles: [outlet]
          preferred_attachment_sites:
            outlet: east

extensions:
  grcv3:
    contract_version: grcv3.rich.v2
    rich_required: true
  source_probe:
    purpose: grcv3_rich_v2_weak_axis_spark_probe
    intended_geometry:
      - explicit interior probe separated from direct transport loading
      - strong north-south clamp supports
      - weak west-east transport axis
      - attachment isolation through role-directed channels and boundary arcs
