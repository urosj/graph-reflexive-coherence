seed_schema: pygrc.landscape_seed
seed_version: "0.1"

meta:
  name: GRCL9V3 Corrected Multi Center Relay Attempt
  description: Corrected relay feasibility probe; records whether full same-node growth/collapse/growth relay survives front-capacity gating.
  source_kind: manual_seed
  source_reference: implementation/GRCL-9V3-ImplementationChecklist.md#iteration-925-corrected-collapselearningrelay-feasibility
  source_schema_version: "0.1"
  source_domain: grcl9v3
  tags: [grcl9v3, corrected_growth, multi_center, relay, feasibility]
  translator_name: manual_seed_authoring
  translator_version: "0.1"
  translation_mode: semantic_enrichment

constitutive_profile:
  lambda_c: 1.0
  xi_c: 1.5
  zeta_c: 0.8
  kappa_c: 1.0
  dt: 0.001
  potential:
    type: double_well
    params: {a: 1.0, b: 1.2}

primitives:
  - id: front_refinement
    type: junction
    host_id: growth_center_a
    branch_target_ids: [growth_center_a, growth_center_b, relay_outlet]
    extensions:
      grcl9v3:
        term_kind: refinement_locus
        term_id: corrected_multi_center_relay_refinement
        region_id: growth_center_a
        source_role: corrected_relay_probe
        profile:
          target_effective_degree: 9
          expansion_distribution_mode: equal
          coherence_transfer_ratios: [0.3333333333333333, 0.3333333333333333, 0.3333333333333333]
          front_capacity_role: relay_refinement_front
  - id: growth_center_a_boundary
    type: ridge
    owner_id: growth_center_a
    adjacent_ids: [relay_outlet]
    extensions:
      grcl9v3:
        term_kind: boundary_stratum
        term_id: corrected_multi_center_relay_growth_a_boundary
        region_id: growth_center_a
        source_role: corrected_relay_probe
        profile:
          inactive_parent_port: 5
          front_capacity_source: spark_expansion_front
          front_source_construct_id: corrected_multi_center_relay_attempt_expansion_region
  - id: growth_center_a_locus
    type: valley
    from_id: growth_center_a
    to_id: relay_outlet
    extensions:
      grcl9v3:
        term_kind: growth_locus
        term_id: corrected_multi_center_relay_growth_a_locus
        region_id: growth_center_a
        source_role: corrected_relay_probe
        profile:
          outward_pressure_profile:
            pressure: corrected_front_relay_pressure
            geometry: relay_port
            parent_coherence: 4.0
            support_coherence: 8.0
            support_conductance: 1.5
            support_flux: 1.0
            outlet_coherence: 0.25
            outlet_conductance: 0.15
          lambda_birth: 100.0
          growth_semantics: front_capacity
          front_capacity_source: spark_expansion_front
          front_source_construct_id: corrected_multi_center_relay_attempt_expansion_region
  - id: choice_center
    type: saddle
    branch_target_ids: [winner_center, relay_outlet]
    extensions:
      grcl9v3:
        term_kind: choice_collapse_region
        term_id: corrected_multi_center_relay_choice
        region_id: choice_center
        source_role: corrected_relay_probe
        profile:
          basin_region_a: winner_center
          basin_region_b: relay_outlet
          collapse_target_region: winner_center
          compatibility_profile: {compatibility: high_contrast, seed_choice_registry: false}
  - id: growth_center_a
    type: basin
    coherence_prior: 1.0
  - id: growth_center_b
    type: basin
    coherence_prior: 1.0
  - id: relay_outlet
    type: basin
    coherence_prior: 0.25
  - id: winner_center
    type: basin
    coherence_prior: 1.0

extensions:
  grcl9v3:
    contract_version: grcl9v3.landscape_example.v1
    grcl9v3_required: true
    example_name: corrected_multi_center_relay_attempt
    manifest_entry_id: composed_grcl9v3_hybrid_composition_v1
    motif_id: grc9v3-motif-s0055-corrected-multi-center-relay-attempt
    expected_selector_ids: [growth_events, front_growth_provenance, choice_collapse_events, basin_assignment_learning, growth_collapse_relay_diagnostics]
    notes:
      iteration: 9.2.5
      corrected_growth_semantics: front_capacity
      feasibility_claim: relay_attempt_may_remain_diagnostic_only
      boundary: source preconditions only
      composed_source_ancestry:
        - corrected_multi_center_delayed_collapse_learning
        - corrected_front_growth_positive_control
