        term_kind: critical_region
        term_id: appendix_e_cell_division_composing_cell_critical
        region_id: cell_parent
        source_role: composing_cell_control
        profile:
          criticality: hybrid_spark_gate
          saturation:
            active_degree: 9
            port_chart: nine_port_candidate
          spark_gate_intent: hybrid_hessian_tensor
          spark_threshold: 0.05
  - id: division_refinement
    type: junction
    host_id: cell_parent
    branch_target_ids: [daughter_a, daughter_b, cytoplasm_plateau]
    extensions:
      grcl9v3:
        term_kind: refinement_locus
        term_id: appendix_e_cell_division_composing_cell_refinement
        region_id: cell_parent
        source_role: composing_cell_control
        profile:
          target_effective_degree: 51
          expansion_distribution_mode: equal
          coherence_transfer_ratios: [0.3333333333333333, 0.3333333333333333, 0.3333333333333333]
  - id: division_locus
    type: junction
    host_id: cell_parent
    branch_target_ids: [daughter_a, daughter_b]
    extensions:
      grcl9v3:
        term_kind: appendix_e_cell_division_region
        term_id: appendix_e_cell_division_composing_cell_appendix_e
