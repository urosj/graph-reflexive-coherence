        source_role: composing_cell_control
        profile:
          daughter_region_a: daughter_a
          daughter_region_b: daughter_b
          module_basin_support:
            support_mode: balanced_daughter_support
  - id: division_membrane
    type: ridge
    adjacent_ids: [daughter_a, daughter_b]
    extensions:
      grcl9v3:
        term_kind: separatrix
        term_id: appendix_e_cell_division_composing_cell_separatrix
        region_id: division_membrane
        source_role: composing_cell_control
        profile:
          separates: [daughter_a, daughter_b]
  - id: cytoplasm_plateau
    type: plateau
    coherence_prior: 0.6
    extensions:
      grcl9v3:
        term_kind: plateau_support
        term_id: appendix_e_cell_division_composing_cell_plateau
        region_id: cytoplasm_plateau
        source_role: composing_cell_control
        profile:
          support: daughter_basin_support
  - id: daughter_a
    type: basin
    coherence_prior: 0.9
  - id: daughter_b
    type: basin
    coherence_prior: 0.9

extensions:
