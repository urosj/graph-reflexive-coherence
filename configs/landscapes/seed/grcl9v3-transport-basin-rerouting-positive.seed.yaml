    type: valley
    from_id: source
    to_id: sink
    extensions:
      grcl9v3:
        term_kind: valley_channel
        term_id: transport_basin_rerouting_positive_control_valley
        region_id: route
        source_role: positive_control
        profile:
          channel: transport_corridor
  - id: sink
    type: basin
    coherence_prior: 0.2

extensions:
  grcl9v3:
    contract_version: grcl9v3.landscape_example.v1
    grcl9v3_required: true
    example_name: transport_basin_rerouting_positive_control
    manifest_entry_id: future_vocabulary_transport_basin_rerouting_v1
