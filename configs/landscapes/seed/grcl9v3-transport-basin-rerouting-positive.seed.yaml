    type: basin
    coherence_prior: 1.0
  - id: route
    type: valley
    from_id: source
    to_id: sink
    extensions:
      grcl9v3:
        term_kind: transport_rerouting_region
        term_id: transport_basin_rerouting_positive_control_transport
        region_id: route
        source_role: positive_control
        profile:
          source_region_id: source
          sink_region_id: sink
          route_preference_profile:
            corridor: preferred
