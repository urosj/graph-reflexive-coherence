  xi_c: 1.5
  zeta_c: 0.8
  kappa_c: 1.0
  dt: 0.001
  potential:
    type: multi_well
    params: {basin_count: 3, saddle_bias: cascade}

primitives:
  - id: pressure_valley
    type: valley
    from_id: basin_a
    to_id: growth_boundary
    extensions:
      grcl9:
        term_kind: gradient_pressure
        term_id: cell_full_capacity_cascade_no_refinement_gradient_pressure
        motif_id: cascade_growth
        pressure_id: outward_pressure
        boundary_stratum_id: growth_boundary
        pressure_class: high
        lambda_birth: 0.05
  - id: growth_boundary
    type: ridge
    owner_id: basin_a
    adjacent_ids: [pressure_valley]
    extensions:
      grcl9:
        term_kind: boundary_stratum
        term_id: cell_full_capacity_cascade_no_refinement_boundary_stratum
        motif_id: cascade_growth
        stratum_id: growth_boundary
        parent_region_id: parent
        inactive_port: 5
        boundary_role: growth_boundary
  - id: post_refinement_plateau
    type: plateau
    extensions:
      grcl9:
        term_kind: post_refinement_two_sink_region
        term_id: cell_full_capacity_cascade_no_refinement_two_sink_region
        motif_id: cascade_fission
        region_id: post_refinement_region
        module_region_id: module
        sink_region_a: sink_a
        sink_region_b: sink_b
        identity_fission_min_basin_mass: 0.10
        identity_fission_persistence_delta: 6
  - id: basin_a
    type: basin
    extensions:
      grcl9:
        term_kind: stable_basin
        term_id: cell_full_capacity_cascade_no_refinement_stable_basin_a
        motif_id: cascade_fission
        basin_id: sink_a
        stability_class: stable
        mass_hint: 0.90
        support_node_count: 4
        selection_policy: group_centroid
  - id: basin_b
    type: basin
    extensions:
      grcl9:
        term_kind: stable_basin
        term_id: cell_full_capacity_cascade_no_refinement_stable_basin_b
        motif_id: cascade_fission
        basin_id: sink_b
        stability_class: collapsing
        mass_hint: 0.04
        support_node_count: 4
        selection_policy: member_node
  - id: merge_saddle
    type: saddle
    branch_target_ids: [basin_a, basin_b]
    extensions:
      grcl9:
        term_kind: saddle_bridge
        term_id: cell_full_capacity_cascade_no_refinement_saddle_bridge
        motif_id: cascade_fission
        bridge_id: cascade_merge_bridge
        region_a: sink_a
        region_b: sink_b
        bridge_class: merge_saddle_bridge

extensions:
  grcl9:
    contract_version: grcl9.landscape_example.v1
    grcl9_required: true
    example_name: cell_full_capacity_cascade_no_refinement
    manifest_entry_id: grcl9_lowering_post_expansion_fission_v1
