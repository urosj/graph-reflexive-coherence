seed_schema: pygrc.landscape_seed
seed_version: "0.1"

meta:
  name: GRCL9V3 Growth Pressure Positive
  description: Seed-backed GRCL-9V3 boundary stratum with high outward pressure from S0014.
  source_kind: manual_seed
  source_reference: outputs/grc9v3/phenomenology_discovery/sessions/S0014/source_language_handoff.json
  source_schema_version: "0.1"
  source_domain: grcl9v3
  tags: [grcl9v3, s0014, growth, boundary]
  translator_name: manual_seed_authoring
  translator_version: "0.1"
  translation_mode: semantic_enrichment

constitutive_profile:
  lambda_c: 1.0
  xi_c: 1.5
  zeta_c: 0.8
  kappa_c: 1.0
  dt: 0.001
  potential:
    type: double_well
    params:
      a: 1.0
      b: 1.2

primitives:
  - id: parent
    type: basin
    coherence_prior: 1.0
  - id: boundary
    type: ridge
    owner_id: parent
    adjacent_ids: [outside]
    extensions:
      grcl9v3:
        term_kind: boundary_stratum
        term_id: growth_pressure_positive_control_boundary
        region_id: parent
        source_role: positive_control
        profile:
          inactive_parent_port: 5
  - id: growth_locus
    type: valley
    from_id: parent
    to_id: outside
    extensions:
      grcl9v3:
        term_kind: growth_locus
        term_id: growth_pressure_positive_control_growth
        region_id: parent
        source_role: positive_control
        profile:
          outward_pressure_profile:
            pressure: high_outward_pressure
          lambda_birth: 1.4
  - id: outside
    type: plateau
    coherence_prior: 0.1

extensions:
  grcl9v3:
    contract_version: grcl9v3.landscape_example.v1
    grcl9v3_required: true
    example_name: growth_pressure_positive_control
    manifest_entry_id: grcl9v3_lowering_growth_pressure_v1
    motif_id: grc9v3-motif-s0006-growth-pressure-positive-control
    expected_selector_ids: [growth_events]
    notes:
      discovery_anchor: S0014 source-language handoff
      boundary: source preconditions only
