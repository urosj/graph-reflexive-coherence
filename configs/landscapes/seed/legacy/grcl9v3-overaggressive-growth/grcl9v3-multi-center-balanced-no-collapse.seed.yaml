seed_schema: pygrc.landscape_seed
seed_version: "0.1"

meta:
  name: GRCL9V3 Multi Center Balanced No Collapse
  description: Multi-center GRCL-9V3 balanced control with growth but no choice/collapse backend.
  source_kind: manual_seed
  source_reference: implementation/GRCL-9V3-ImplementationChecklist.md#iteration-86-multi-center-collapse-and-basin-assignment-learning
  source_schema_version: "0.1"
  source_domain: grcl9v3
  tags: [grcl9v3, multi_center, no_collapse, growth_control]
  translator_name: manual_seed_authoring
  translator_version: "0.1"
  translation_mode: semantic_enrichment

constitutive_profile:
  lambda_c: 1.0
  xi_c: 1.5
  zeta_c: 0.8
  kappa_c: 1.0
  dt: 0.001
  potential:
    type: double_well
    params: {a: 1.0, b: 1.2}

primitives:
  - id: growth_center_a_boundary
    type: ridge
    owner_id: growth_center_a
    adjacent_ids: [outer_a]
    extensions:
      grcl9v3:
        term_kind: boundary_stratum
        term_id: multi_center_balanced_growth_a_boundary
        region_id: growth_center_a
        source_role: multi_center_no_collapse_control
        profile: {inactive_parent_port: 5}
  - id: growth_center_a_locus
    type: valley
    from_id: growth_center_a
    to_id: outer_a
    extensions:
      grcl9v3:
        term_kind: growth_locus
        term_id: multi_center_balanced_growth_a_locus
        region_id: growth_center_a
        source_role: multi_center_no_collapse_control
        profile:
          outward_pressure_profile: {pressure: high_outward_pressure}
          lambda_birth: 0.02
  - id: growth_center_b_boundary
    type: ridge
    owner_id: growth_center_b
    adjacent_ids: [outer_b]
    extensions:
      grcl9v3:
        term_kind: boundary_stratum
        term_id: multi_center_balanced_growth_b_boundary
        region_id: growth_center_b
        source_role: multi_center_no_collapse_control
        profile: {inactive_parent_port: 5}
  - id: growth_center_b_locus
    type: valley
    from_id: growth_center_b
    to_id: outer_b
    extensions:
      grcl9v3:
        term_kind: growth_locus
        term_id: multi_center_balanced_growth_b_locus
        region_id: growth_center_b
        source_role: multi_center_no_collapse_control
        profile:
          outward_pressure_profile: {pressure: high_outward_pressure}
          lambda_birth: 0.02
  - id: choice_center_a
    type: saddle
    branch_target_ids: [winner_center, losing_center_a]
    extensions:
      grcl9v3:
        term_kind: choice_collapse_region
        term_id: multi_center_balanced_choice_a
        region_id: choice_center_a
        source_role: multi_center_no_collapse_control
        profile:
          basin_region_a: winner_center
          basin_region_b: losing_center_a
          collapse_target_region: winner_center
          compatibility_profile: {compatibility: low_contrast}
  - id: choice_center_b
    type: saddle
    branch_target_ids: [winner_center, losing_center_b]
    extensions:
      grcl9v3:
        term_kind: choice_collapse_region
        term_id: multi_center_balanced_choice_b
        region_id: choice_center_b
        source_role: multi_center_no_collapse_control
        profile:
          basin_region_a: winner_center
          basin_region_b: losing_center_b
          collapse_target_region: winner_center
          compatibility_profile: {compatibility: low_contrast}
  - id: growth_center_a
    type: basin
    coherence_prior: 1.0
  - id: growth_center_b
    type: basin
    coherence_prior: 1.0
  - id: outer_a
    type: plateau
    coherence_prior: 0.1
  - id: outer_b
    type: plateau
    coherence_prior: 0.1
  - id: winner_center
    type: basin
    coherence_prior: 1.0
  - id: losing_center_a
    type: basin
    coherence_prior: 1.0
  - id: losing_center_b
    type: basin
    coherence_prior: 1.0

extensions:
  grcl9v3:
    contract_version: grcl9v3.landscape_example.v1
    grcl9v3_required: true
    example_name: multi_center_balanced_no_collapse
    manifest_entry_id: composed_grcl9v3_hybrid_composition_v1
    motif_id: grc9v3-motif-s0028-multi-center-balanced-no-collapse
    expected_selector_ids: [growth_events, no_choice_collapse_events]
    notes:
      composing_cells_anchor: multi-center balanced no-collapse control
      boundary: source preconditions only
      learning_claim_boundary: no_learning_claim
      composed_source_ancestry:
        - multi_center_collapse_learning
        - choice_collapse_negative_control
