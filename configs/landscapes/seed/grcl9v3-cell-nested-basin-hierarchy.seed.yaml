seed_schema: pygrc.landscape_seed
seed_version: "0.1"

meta:
  name: GRCL9V3 Cell Nested Basin Hierarchy
  description: ComposingCells-aligned nested basin and plateau seed for hierarchy-producing refinement evidence.
  source_kind: manual_seed
  source_reference: implementation/GRCL-9V3-ImplementationChecklist.md#iteration-84-composingcells-aligned-hybrid-seeds
  source_schema_version: "0.1"
  source_domain: grcl9v3
  tags: [grcl9v3, composing_cells, nested_basin, hierarchy, expansion]
  translator_name: manual_seed_authoring
  translator_version: "0.1"
  translation_mode: semantic_enrichment

constitutive_profile:
  lambda_c: 1.0
  xi_c: 1.5
  zeta_c: 0.8
  kappa_c: 1.0
  dt: 0.001
  potential:
    type: double_well
    params:
      a: 1.0
      b: 1.2

primitives:
  - id: parent_basin
    type: saddle
    coherence_prior: 1.0
    branch_target_ids: [daughter_a, daughter_b, support_plateau]
    extensions:
      grcl9v3:
        term_kind: critical_region
        term_id: cell_nested_basin_hierarchy_critical
        region_id: parent_basin
        source_role: composing_cell_control
        profile:
          criticality: hybrid_spark_gate
          saturation:
            active_degree: 9
            port_chart: nine_port_candidate
          spark_gate_intent: hybrid_hessian_tensor
          spark_threshold: 0.05
  - id: nested_refinement
    type: junction
    host_id: parent_basin
    branch_target_ids: [daughter_a, daughter_b, support_plateau]
    extensions:
      grcl9v3:
        term_kind: refinement_locus
        term_id: cell_nested_basin_hierarchy_refinement
        region_id: parent_basin
        source_role: composing_cell_control
        profile:
          target_effective_degree: 51
          expansion_distribution_mode: equal
          coherence_transfer_ratios: [0.3333333333333333, 0.3333333333333333, 0.3333333333333333]
  - id: hierarchy_split
    type: junction
    host_id: parent_basin
    branch_target_ids: [daughter_a, daughter_b]
    extensions:
      grcl9v3:
        term_kind: appendix_e_cell_division_region
        term_id: cell_nested_basin_hierarchy_appendix_e
        region_id: parent_basin
        source_role: composing_cell_control
        profile:
          daughter_region_a: daughter_a
          daughter_region_b: daughter_b
          module_basin_support:
            support_mode: balanced_daughter_support
  - id: support_plateau
    type: plateau
    coherence_prior: 0.6
    extensions:
      grcl9v3:
        term_kind: plateau_support
        term_id: cell_nested_basin_hierarchy_plateau
        region_id: support_plateau
        source_role: composing_cell_control
        profile:
          support: nested_parent_plateau
  - id: daughter_separator
    type: ridge
    adjacent_ids: [daughter_a, daughter_b]
    extensions:
      grcl9v3:
        term_kind: separatrix
        term_id: cell_nested_basin_hierarchy_separatrix
        region_id: daughter_separator
        source_role: composing_cell_control
        profile:
          separates: [daughter_a, daughter_b]
  - id: daughter_a
    type: basin
    coherence_prior: 0.9
  - id: daughter_b
    type: basin
    coherence_prior: 0.9

extensions:
  grcl9v3:
    contract_version: grcl9v3.landscape_example.v1
    grcl9v3_required: true
    example_name: cell_nested_basin_hierarchy
    manifest_entry_id: composed_grcl9v3_hybrid_composition_v1
    motif_id: grc9v3-motif-s0019-cell-nested-basin-hierarchy
    expected_selector_ids: [hybrid_expansion_events]
    notes:
      composing_cells_anchor: nested basins separated by a ridge and supported by a plateau
      boundary: source preconditions only
      composed_source_ancestry:
        - appendix_e_cell_division_positive_control
        - spark_to_expansion_positive_control

